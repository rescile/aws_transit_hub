# A cloud provider owns and operates data centers to "rent out" computing power, storage, and/or software.
origin_resource = "account"

[[create_resource]]
resource_type = "provider"
relation_type = "DEFINED_BY"
name = "{{- origin_resource.original_name -}}_{{- origin_resource.function -}}"
[create_resource.properties]
function = "public"
display_name = "{{- origin_resource.original_name -}}"
commercial_admin = "account_management"
technical_admin = "cloud_operation"
region = "{{- location -}}"
description = "Amazon Web Services (AWS) is a cloud provider that specializes in providing an ecosystem of scalable and integrated services. Technically, AWS distinguishes itself from competitors primarily through the breadth and maturity of its portfolio—ranging from serverless architectures to hardware accelerators."
created = "{{- now(utc=true) | date(format='%Y-%m-%dT%H:%M:%SZ') -}}"
