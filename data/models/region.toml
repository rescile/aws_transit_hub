# This model represents a third tier model of a cloud domain and defines locations where provider resources can be consumed.
origin_resource = "provider"

prefix = { "json!" = "aws_ip_ranges.json", jamespath = "prefixes[?region=='eu-central-2'].ip_prefix" }

# Create the resource type
[[create_resource]]
create_from = { property = "region" }
relation_type = "MANAGED_BY"
[create_resource.properties]
function = "{{- origin_resource.display_name -}}"
ip_prefix = "{{- prefix -}}"
description = "The region describes the physical, geographical place where infrastructure resides, where your data is stored, and where your applications run."
created = "{{- now(utc=true) | date(format='%Y-%m-%dT%H:%M:%SZ') -}}"
