# This model represents the top tier for a cloud domain and defines the domains based on the provider list
origin_resource = "provider"

# Create a resource type
[[create_resource]]
create_from = { property = "domain" }
relation_type = "BASELINE_TEMPLATE"
[create_resource.properties]
function = "{{- origin_resource.function -}}"
description = "The {{ property.value }} domain creates secure boundaries for management, maintenance, and operation of the resources required to deploy {{ origin_resource.function }} services."
created = "{{- now(utc=true) | date(format='%Y-%m-%dT%H:%M:%SZ') -}}"
