[module]
name = "AWS Network Hub"
url = "https://github.com/rescile/oci_landing_zone"
version = "0.0.1"
description = "A network hub acts as a centralized Transit Gateway for SaaS provider and simplifies connectivity by routing traffic between multiple application VPCs and customer networks through a single, scalable point. This architecture creates a hub-and-spoke model that allows the provider to efficiently manage security inspections and inter-service communication without the complexity of individual peering connections."
rescile_version = ">=0.1.138"

# dependencies: Optional list of other modules this module depends on.
[dependencies]
graphviewer = "https://github.com/rescile/graphviewer"
graml-module =  "https://github.com/rescile/graphml-module"
rescile-graphiql-module = "https://github.com/rescile/rescile-graphiql-module/releases/download/v0.0.3/graphiql-module-offline.zip"

[params.solution]
description = "The solution describes the service footprint."
required = true
default = "TransitHub"

[params.stage]
description = "The lifecycle stage of the solution."
required = true
default = "DEV"
allowed_values = ["DEV", "TEST", "PROD"]

[params.tenant]
description = "The tenant name identifiers the organization that uses the service."
required = true
default = "YourName"

[params.location]
description = "The regions to deploy the solution in."
required = true
default = "eu-central-2"

[assets."provider.csv"]
resource_type = "provider"
description = "The main asset file defining providers."
name_template = "{{- name | lower -}}_{{- function  | lower -}}_account"
[assets."provider.csv".columns]
name = { type = "string", required = true }
function = { type = "string", required = true }

[assets."identity.csv"]
resource_type = "identity"
description = "The main asset file defining virtual identities."
name_template = "{{- scope | lower -}}_{{- name  | lower -}}_{{- function | lower -}}"
[assets."identity.csv".columns]
name = { type = "string", required = true }
function = { type = "string", required = true }
scope = { type = "string", required = false }

[generator.aws_region_endpoints]
runner = "http"
target_input = "aws_region_endpoint.json"
method = "GET"
url = "https://ip-ranges.amazonaws.com/ip-ranges.json"
abort_on_failure = true

[generator.aws_index]
runner = "http"
target_input = "aws_index.json"
method = "GET"
url = "https://pricing.us-east-1.amazonaws.com/offers/v1.0/aws/index.json"
abort_on_failure = false

[generator.aws_region_service]
description = "Fetch AWS regional endpoints from GitHub."
runner = "exec"
target_input = "aws_region_service.json"
command = ["aws_region_service.sh"]
from_stdout = false
ttl = "24h"

[generator.aws_region_data]
description = "Fetch AWS regional data from GitHub."
runner = "exec"
target_input = "aws_region_data.json"
command = ["aws_region_data.sh"]
from_stdout = false
ttl = "24h"
